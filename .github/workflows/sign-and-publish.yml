name: sign-and-publish

# Runs on every push to main that touches the skill set. Rebuilds all
# bundles, re-signs them with the registry signing key (an Actions secret),
# regenerates index.json, and commits the lot back to main.
#
# Signing every bundle every time is deliberate: it means the on-disk state
# of main always matches the signed state, no partial updates, no stale
# signatures. The bundles are small (kilobytes each) so this is cheap.
#
# SECRETS
#   ARI_REGISTRY_SIGNING_KEY  Hex-encoded 32-byte Ed25519 private key, as
#                        produced by `ari-sign-bundle gen-key` (see
#                        GOVERNANCE.md for the key rotation procedure).

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'tools/**'
      - '.github/workflows/sign-and-publish.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Publishes must not overlap. Two runs both regenerate index.json and push to
# main; the loser dies on `! [rejected] (fetch first)` (seen 2026-07-15 with
# #49 and #50). Benign that time, but the reverse interleaving is not: if the
# run that checked out the EARLIER commit wins the push, main gets a signed
# index built from a tree missing the later merge. Queued runs collapse to the
# newest, which is what we want — build-index.sh rebuilds every bundle from
# scratch, so the newest tree is always a superset of the ones behind it.
concurrency:
  group: sign-and-publish
  cancel-in-progress: false

env:
  ARI_ENGINE_REF: main
  # Force JS actions onto Node 24 ahead of the 2026-06-02 default flip.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Silence git default-branch hint
        run: git config --global init.defaultBranch main

      - name: Check out ari-skills
        uses: actions/checkout@v5
        with:
          # Full history so the rebase-before-push below has a real merge base
          # to work from; a depth-1 clone makes that a coin toss. The registry
          # is kilobytes — validate.yml already clones it whole.
          fetch-depth: 0

      - name: Check out ari-engine
        uses: actions/checkout@v5
        with:
          repository: ari-digital-assistant/ari-engine
          ref: ${{ env.ARI_ENGINE_REF }}
          path: ari-engine-src

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ari-engine-src/target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('ari-engine-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Build validator + signer
        working-directory: ari-engine-src
        run: cargo build --release -p ari-skill-validate -p ari-sign-bundle

      - name: Install jq (usually preinstalled)
        run: command -v jq >/dev/null || sudo apt-get install -y jq

      - name: Materialise signing key from secret
        env:
          ARI_REGISTRY_SIGNING_KEY: ${{ secrets.ARI_REGISTRY_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${ARI_REGISTRY_SIGNING_KEY:-}" ]]; then
            echo "ARI_REGISTRY_SIGNING_KEY secret is not set" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/ari-keys"
          chmod 700 "$RUNNER_TEMP/ari-keys"
          key_path="$RUNNER_TEMP/ari-keys/registry.key"
          printf '%s' "$ARI_REGISTRY_SIGNING_KEY" | xxd -r -p > "$key_path"
          chmod 600 "$key_path"
          if [[ ! -s "$key_path" ]]; then
            echo "decoded key is empty — is the secret hex-encoded?" >&2
            exit 1
          fi
          echo "ARI_SIGNING_KEY_FILE=$key_path" >> "$GITHUB_ENV"

      - name: Build bundles, sign, regenerate index.json
        env:
          ARI_SKILL_VALIDATE: ${{ github.workspace }}/ari-engine-src/target/release/ari-skill-validate
          ARI_SIGN_BUNDLE: ${{ github.workspace }}/ari-engine-src/target/release/ari-sign-bundle
        run: ./tools/build-index.sh

      - name: Commit updated index and bundles
        run: |
          set -euo pipefail
          git config user.name "ari-skills-bot"
          git config user.email "ari-skills-bot@users.noreply.github.com"
          git add index.json bundles/ manifests/
          if git diff --cached --quiet; then
            echo "nothing to commit — index, bundles, and manifests are already up to date"
            exit 0
          fi
          git commit -m "chore(registry): publish signed bundles + manifests + index.json for ${{ github.sha }}"
          # The concurrency group keeps other publishes off our back, but a
          # human merge can still land on main while we were building. Our
          # commit only touches generated paths, so rebasing onto it is
          # conflict-free — and that merge triggers its own publish run, which
          # queues behind this one and supersedes what we push here.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "push race (attempt $attempt), retrying..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "could not push the signed index after 3 attempts" >&2
          exit 1

      - name: Scrub key file
        if: always()
        run: |
          if [[ -n "${ARI_SIGNING_KEY_FILE:-}" && -f "$ARI_SIGNING_KEY_FILE" ]]; then
            shred -u "$ARI_SIGNING_KEY_FILE" || rm -f "$ARI_SIGNING_KEY_FILE"
          fi
